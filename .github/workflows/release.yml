name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: matrix.cross == true
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: cargo build --locked --release --bin goat --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          target="${{ matrix.target }}"
          asset="goat-${tag}-${target}.tar.gz"
          staging="dist/${target}"
          mkdir -p "${staging}"
          cp "target/${target}/release/goat" "${staging}/goat"
          chmod 755 "${staging}/goat"
          tar -C "${staging}" -czf "dist/${asset}" goat
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${asset}" > "${asset}.sha256")
          else
            (cd dist && shasum -a 256 "${asset}" > "${asset}.sha256")
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/goat-${{ steps.meta.outputs.tag }}-${{ matrix.target }}.tar.gz
            dist/goat-${{ steps.meta.outputs.tag }}-${{ matrix.target }}.tar.gz.sha256
