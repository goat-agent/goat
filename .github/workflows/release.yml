name: release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          manifest_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "goat") | .version')
          test "${version}" = "${manifest_version}"
          prerelease=false
          case "${version}" in
            *-*) prerelease=true ;;
          esac
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux ARM64 cross toolchain
        if: matrix.cross == true
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: cargo build --locked --release --bin goat --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          asset="goat-${target}.tar.gz"
          staging="dist/${target}"
          mkdir -p "${staging}"
          cp "target/${target}/release/goat" "${staging}/goat"
          chmod 755 "${staging}/goat"
          tar -C "${staging}" -czf "dist/${asset}" goat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goat-${{ matrix.target }}
          path: dist/goat-${{ matrix.target }}.tar.gz

  publish:
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum goat-*.tar.gz > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*
